<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pizarra Dashboard</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <h1 id="board-title">Pizarra Dashboard</h1>
            <p>Administra tus notas con estilo Dark Mode / Neón.</p>
        </header>

        <section class="dashboard-info">
            <article class="hero-card">
                <div>
                    <span class="tag">Dashboard Inteligente</span>
                    <h2 id="greeting-text">Bienvenido, desarrollador. Aquí encontrarás tu espacio creativo.</h2>
                </div>
                <div class="hero-meta">
                    <div class="meta-card">
                        <span>Hora actual</span>
                        <strong id="current-time">--:--:--</strong>
                        <p id="current-date">Cargando fecha...</p>
                    </div>
                    <div class="meta-card advice-card">
                        <span>Consejo</span>
                        <p id="advice-text">Cargando consejo...</p>
                        <button id="refresh-advice" type="button">Recargar consejo</button>
                    </div>
                </div>
            </article>
        </section>

        <section class="controls">
            <input id="note-title" type="text" placeholder="Título de la nota" />
            <textarea id="note-content" placeholder="Escribe tu nota aquí..."></textarea>
            <button id="add-note">Agregar nota</button>
        </section>

        <section class="notes-grid" id="notes-grid"></section>
    </div>

    <script src="app.js"></script>
</body>
</html>
